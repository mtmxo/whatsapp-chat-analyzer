name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test su Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Installa uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Esegui la suite di test
        # gli extra dev e pandas servono per pytest e per il test di export su DataFrame
        run: uv run --extra dev --extra pandas pytest -v
