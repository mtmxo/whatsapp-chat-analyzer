name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run the test suite
        # the dev and pandas extras are needed for pytest and the DataFrame export test
        run: uv run --extra dev --extra pandas pytest -v
